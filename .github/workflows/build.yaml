name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

    - uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build image
      run: |
        docker build -t talos-python-demo:scan .

    - name: Push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ghcr.io/sridevi0616/talos-python-demo:latest
