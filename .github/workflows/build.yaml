name: Build and Push

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    env:
      IMAGE_TAG: v${{ github.run_number }}

    steps:

    - uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}
        
    #- name: Setup Python
      #uses: actions/setup-python@v5
      #with:
        #python-version: '3.12'

    #- name: Install analysis tools
      #run: |
        #pip install pylint flake8 bandit

    #- name: Run Flake8
      #run: |
        #flake8 app.py

    #- name: Run Pylint
      #run: |
        #pylint app.py || true

    #- name: Run Bandit Security Scan
      #run: |
        #bandit -r .  
    - name: Build image locally
      run: |
       docker build -t talos-python-demo:${IMAGE_TAG} .  
       
    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: talos-python-demo:${{ env.IMAGE_TAG }}
        format: table
        severity: HIGH,CRITICAL
        exit-code: 1    

    - name: Push Image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ghcr.io/sridevi0616/talos-python-demo:${{ env.IMAGE_TAG }}

    - name: Checkout GitOps Repo
      uses: actions/checkout@v4
      with:
        repository: sridevi0616/talos-gitops
        token: ${{ secrets.GHCR_TOKEN }}
        path: gitops

    - name: Update Deployment YAML
      run: |
        sed -i 's|image:.*|image: ghcr.io/sridevi0616/talos-python-demo:'"${IMAGE_TAG}"'|' \
        gitops/apps/python-demo/deployment.yaml

    - name: Commit and Push Changes
      run: |
        cd gitops

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .

        git commit -m "Update image to ${IMAGE_TAG}" || echo "No changes"

        git push
