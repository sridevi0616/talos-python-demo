name: Backend Build

on:
  push:
    branches:
      - main  

    paths:
      - 'backend/**'
      - 'backend/Dockerfile'

jobs:

  backend:

    runs-on: self-hosted

    permissions:
      contents: write
      packages: write
      security-events: write
      id-token: write

    env:
      IMAGE_TAG: v${{ github.run_number }}

    steps:

    - name: Login to Harbor
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.HARBOR_URL }}
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}

    - name: Build backend image
      run: |
        docker build \
        -f backend/Dockerfile \
        -t unmsharbor.com:8085/talos-demo/backend:${{ env.IMAGE_TAG }} .
 

    - name: Push backend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: backend/Dockerfile
        push: true
        tags: unmsharbor.com:8085/talos-demo/backend:${{ env.IMAGE_TAG }}
        

    - name: Update backend deployment
      run: |
        sed -i 's|image:.*|image: unmsharbor.com:8085/talos-demo/backend:'"${IMAGE_TAG}"'|' \
        gitops/apps/backend/deployment.yaml

    - name: Push GitOps changes
      run: |
        cd gitops

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .

        git commit -m "Update backend image ${IMAGE_TAG}" || echo "No changes"

        git push
