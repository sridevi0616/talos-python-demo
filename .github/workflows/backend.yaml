name: Backend Build

on:
  push:
    branches:
      - main

    paths:
      - 'backend/**'
      - 'backend/Dockerfile'

jobs:

  backend:

    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      security-events: write

    env:
      IMAGE_TAG: v${{ github.run_number }}

    steps:

    - uses: actions/checkout@v4
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: python

    - name: CodeQL Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Run CodeQL Analysis
      uses: github/codeql-action/analyze@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build backend image
      run: |
        docker build \
        -f backend/Dockerfile \
        -t backend:${IMAGE_TAG} .

    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: backend:${{ env.IMAGE_TAG }}
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: 1

    - name: Push backend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: backend/Dockerfile
        push: true
        tags: ghcr.io/sridevi0616/backend:${{ env.IMAGE_TAG }}

    - name: Checkout GitOps Repo
      uses: actions/checkout@v4
      with:
        repository: sridevi0616/talos-gitops
        token: ${{ secrets.GHCR_TOKEN }}
        path: gitops

    - name: Update backend deployment
      run: |
        sed -i 's|image:.*|image: ghcr.io/sridevi0616/backend:'"${IMAGE_TAG}"'|' \
        gitops/apps/backend/deployment.yaml

    - name: Push GitOps changes
      run: |
        cd gitops

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .

        git commit -m "Update backend image ${IMAGE_TAG}" || echo "No changes"

        git push
