name: Frontend Build

on:
  push:
    branches:
      - main

    paths:
      - 'frontend/**'
      - 'frontend/Dockerfile'

jobs:

  frontend:

    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    env:
      IMAGE_TAG: v${{ github.run_number }}

    steps:

    - uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_TOKEN }}

    - name: Build frontend image
      run: |
        docker build \
        -f frontend/Dockerfile \
        -t frontend:${IMAGE_TAG} .

    - name: Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: frontend:${{ env.IMAGE_TAG }}
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        exit-code: 1

    - name: Push frontend image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: frontend/Dockerfile
        push: true
        tags: ghcr.io/sridevi0616/frontend:${{ env.IMAGE_TAG }}

    - name: Checkout GitOps Repo
      uses: actions/checkout@v4
      with:
        repository: sridevi0616/talos-gitops
        token: ${{ secrets.GHCR_TOKEN }}
        path: gitops

    - name: Update frontend deployment
      run: |
        sed -i 's|image:.*|image: ghcr.io/sridevi0616/frontend:'"${IMAGE_TAG}"'|' \
        gitops/apps/frontend/deployment.yaml

    - name: Push GitOps changes
      run: |
        cd gitops

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .

        git commit -m "Update frontend image ${IMAGE_TAG}" || echo "No changes"

        git push
